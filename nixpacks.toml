# JDK 21 requis (pom.xml: maven.compiler.release=21)
[variables]
NIXPACKS_JDK_VERSION = "21"

[phases.setup]
nixPkgs = ["jdk21", "maven"]

# Une seule commande : JAVA_HOME ne persiste pas entre plusieurs RUN Docker
[phases.build]
cmds = ["bash scripts/build-nixpacks.sh"]

[start]
cmd = "java -Dserver.port=$PORT $JAVA_OPTS -jar target/*jar"

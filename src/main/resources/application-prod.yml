# Development Profile Configuration
spring:
  datasource:
    url: jdbc:postgresql://164.132.43.247:5432/stock_saas_db
    username: postgres
    password: Nevrose1997!!
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: false  # Désactiver autoCommit pour permettre les transactions
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        connection:
          provider_disables_autocommit: true

  # Configuration Flyway - DÉSACTIVÉ (utilisation du DataSeeder Java uniquement)
  flyway:
    enabled: false

  # Désactivation complète de JMX et DevTools Remote
  devtools:
    remote:
      enabled: false
    restart:
      enabled: true
    livereload:
      enabled: false

logging:
  level:
    root: INFO
    sun:
      rmi: INFO
    com.stocksaas: DEBUG
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

auth:
  cookie:
    # HTTP (IP:8080) : secure=false + Lax. En HTTPS : AUTH_COOKIE_SECURE=true, AUTH_COOKIE_SAME_SITE=None
    secure: ${AUTH_COOKIE_SECURE:false}
    same-site: ${AUTH_COOKIE_SAME_SITE:Lax}

springdoc:
  swagger-ui:
    enabled: true
    try-it-out-enabled: true
    filter: true
  show-actuator: false

# URL de base de l'API (pour les liens de téléchargement de facture envoyés par email)
app:
  base-url: https://sen-stocksaas.com